name: JS Deploy

on:
  push:
    branches:
      - main
    paths:
      - "app/**"
  workflow_dispatch:

concurrency:
  group: typescript-ci-main
  cancel-in-progress: false

jobs:
  js-linter:
    continue-on-error: false
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          cd app
          npm ci

      - name: Run ESLint
        shell: bash
        run: |
          set -euo pipefail
          cd app
          npm run lint

  deploy-to-verify-s3:
    needs:
      - js-linter
    continue-on-error: false
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.PRE_AWS_ROLE_ARN }}
          aws-region: ap-northeast-1

      - name: Deploy to verify S3
        shell: bash
        run: |
          set -euo pipefail
          aws s3 sync ./app "s3://${{ secrets.PRE_S3_BUCKET_NAME }}" --delete

      - name: Invalidate verify CloudFront cache
        shell: bash
        run: |
          set -euo pipefail
          aws cloudfront create-invalidation \
            --distribution-id "${{ secrets.PRE_CLOUDFRONT_DISTRIBUTION_ID }}" \
            --paths "/*"

  deploy-to-prod-s3:
    needs:
      - deploy-to-verify-s3
    continue-on-error: false
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.COM_AWS_ROLE_ARN }}
          aws-region: ap-northeast-1

      - name: Deploy to prod S3
        shell: bash
        run: |
          set -euo pipefail
          aws s3 sync ./app "s3://${{ secrets.COM_S3_BUCKET_NAME }}" --delete

      - name: Invalidate prod CloudFront cache
        shell: bash
        run: |
          set -euo pipefail
          aws cloudfront create-invalidation \
            --distribution-id "${{ secrets.COM_CLOUDFRONT_DISTRIBUTION_ID }}" \
            --paths "/*"

